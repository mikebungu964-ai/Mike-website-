<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Birthday Message</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 360px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
        }

        .department {
            font-size: 14px;
            color: #777;
            margin-bottom: 15px;
        }

        .message {
            font-size: 16px;
            color: #555;
            margin-top: 20px;
            line-height: 1.5;
        }

        .footer {
            margin-top: 20px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
  <canvas id="confetti"></canvas>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
setInterval(() => {
    confetti({
        particleCount: 80,
        spread: 70,
        origin: { y: 0.6 }
    });
}, 2000);
</script>

<div class="card">
    <div class="department">Cascading Style Sheets (CSS)</div>
    <h1>Happy Birthday 🎉</h1>

    <div class="message">
        Hi Mike, we are Cascading Style Sheets (CSS), and we would like to wish you a happy birthday! 
        Wishing you many more amazing years ahead 🎂
        <br><br>
        <p><s>17</s> Welcome 18</p>
        </div<

    <div class="footer">
       </strong> — CSS Department</strong>
    </div>
</div>

</body>
</html>
